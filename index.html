            // Initialize language
            const savedLanguage = localStorage.getItem('language');
            if (savedLanguage && (savedLanguage === 'vi' || savedLanguage === 'en')) {
              currentLanguage.value = savedLanguage;
            }
            
            // Add scroll listener
            window.addEventListener('scroll', updateActiveSection);
            window.addEventListener('resize', updateViewportWidth);
            updateActiveSection();
          });
          
          onUnmounted(() => {
            window.removeEventListener('scroll', updateActiveSection);
            window.removeEventListener('resize', updateViewportWidth);
            clearNotificationTimer();
          });
          
          return {
            isDarkMode,
            isMobileMenuOpen,
            currentLanguage,
            contactForm,
            isSubmitting,
            notification,
            activeSection,
            t,
            currentNavigationItems,
            aboutHighlights,
            skillsPanelText,
            technicalSkills,
            technicalSkillCards,
            professionalSkills,
            softSkills,
            currentServices,
            currentProjects,
            displayedProjects,
            shouldShowProjectToggle,
            projectToggleText,
            toggleDarkMode,
            toggleLanguage,
            toggleMobileMenu,
            toggleProjectsView,
            openProjectLink,
            scrollToSection,
            closeNotification,
            handleSubmit
          };
        }
      };
      
      // Create and mount the app
      createApp(App).mount('#app');
    </script>
  </body>
</html>
